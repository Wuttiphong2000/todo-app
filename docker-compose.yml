services:
  backend:
    build:
      context: ./claude-todo-backend
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - todo_data:/data
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_PATH: /data/todo.db
      # Allow requests proxied through the frontend container (same host origin)
      CLIENT_URL: http://localhost
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: ./claude-todo-frontend-ts
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  todo_data:
