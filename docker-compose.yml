services:
  backend:
    build:
      context: ./claude-todo-backend
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - todo_data:/data
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_PATH: /data/todo.db
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      # Required — generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: ./claude-todo-frontend-ts
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      PORT: "80"
      BACKEND_URL: "http://backend:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  todo_data:
